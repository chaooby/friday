<!DOCTYPE html>
<html>
<head>
  <title>Iron Style Suits</title>
  <style>
    body {
      background: #000;
      color: gold;
      font-family: Arial;
      text-align: center;
    }

    .card {
      display: inline-block;
      width: 220px;
      margin: 10px;
      border: 2px solid gold;
      padding: 10px;
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>Iron Man Style Suits</h1>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?robot,armor">
    <h3>Mark I</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?ironman">
    <h3>Mark III</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?mech,suit">
    <h3>Hulkbuster</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?ai,robot">
    <h3>Mark L</h3>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?futuristic,armor">
    <h3>Mark 85</h3>
  </div>

</body>
</html>
