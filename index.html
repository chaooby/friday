<!DOCTYPE html>

    }

      padding: 10px;
      display: inline-block;
      width: 200px;
    }
  </style>
</head>
<body>

  <h1>Iron Man Suits</h1>

  <div class="box">

  </div>

  </div>

  <div class="box">
    <h3>Mark III</h3>
    <p>First red & gold suit</p>
  </div>

  <div class="box">
    <h3>Mark V</h3>
    <p>Suitcase armor</p>
  </div>

  <div class="box">

  </div>

  <div class="box">

</html>
