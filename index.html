<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Man Suits</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0b0000;
      color: white;
      font-family: Arial;
    }

    h1 {
      color: gold;
      text-align: center;
      margin: 30px 0;
    }

    .card {
      background: #1a0000;
      border: 1px solid gold;
    }

    .card-title {
      color: gold;
      font-weight: bold;
    }

    .card-text {
      color: #fca5a5;
    }

    img {
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>Iron Man Suits</h1>

  <div class="container">
    <div class="row g-4">

      <div class="col-md-4">
        <div class="card">
          <img src="https://via.placeholder.com/400x200?text=Mark+I" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Mark I</h5>
            <p class="card-text">First prototype suit</p>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <img src="https://via.placeholder.com/400x200?text=Mark+III" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Mark III</h5>
            <p class="card-text">First red-gold suit</p>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <img src="https://via.placeholder.com/400x200?text=Hulkbuster" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Hulkbuster</h5>
            <p class="card-text">Heavy combat armor</p>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
