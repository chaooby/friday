<!DOCTYPE html>
<html>
<head>
  <title>Iron Man Suits</title>
  <style>
    body {
      background: black;
      color: gold;
      font-family: Arial;
      text-align: center;
    }

    .box {
      border: 1px solid gold;
      margin: 10px;
      padding: 10px;
      display: inline-block;
      width: 220px;
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <h1>Iron Man Suits</h1>

  <div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/en/4/4c/Iron_Man_Mark_I.png">
    <h3>Mark I</h3>
  </div>

  <div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/en/e/e0/Iron_Man_Mark_III.png">
    <h3>Mark III</h3>
  </div>

  <div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/00/Iron_Man_Hulkbuster.png">
    <h3>Hulkbuster</h3>
  </div>

  <div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/en/8/8c/Iron_Man_Mark_L.png">
    <h3>Mark L</h3>
  </div>

  <div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/en/9/9b/Iron_Man_Mark_85.png">
    <h3>Mark LXXXV</h3>
  </div>

</body>
</html>
