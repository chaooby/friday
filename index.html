<!DOCTYPE html>
<html>
<head>
  <title>Iron Man Suits</title>
  <style>
    body {
      background: black;
      color: gold;
      font-family: Arial;
      text-align: center;
    }

    .box {
      border: 1px solid gold;
      margin: 10px;
      padding: 10px;
      display: inline-block;
      width: 200px;
    }

    img {
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>Iron Man Suits</h1>

  <div class="box">
    <img src="https://via.placeholder.com/200x150?text=Mark+I">
    <h3>Mark I</h3>
  </div>

  <div class="box">
    <img src="https://via.placeholder.com/200x150?text=Mark+III">
    <h3>Mark III</h3>
  </div>

  <div class="box">
    <img src="https://via.placeholder.com/200x150?text=Hulkbuster">
    <h3>Hulkbuster</h3>
  </div>

</body>
</html>
